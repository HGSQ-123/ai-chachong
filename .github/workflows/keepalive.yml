name: 保活防休眠
on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟
  workflow_dispatch:          # 手动触发
  push:
    paths:
      - '.github/workflows/keepalive.yml'  # 修改此文件时触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} - %{time_total}s\n" https://ai-chachong.onrender.com/health

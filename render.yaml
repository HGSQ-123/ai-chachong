# Render.com 部署配置文件
# 使用方法：在Render.com创建Web Service，选择此仓库即可自动部署

services:
  - type: web
    name: ai-chachong
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    # 免费层配置
    plan: free
    # 环境变量（生产环境请修改SECRET_KEY）
    envVars:
      - key: SECRET_KEY
        value: change-this-to-random-string
      - key: PYTHON_VERSION
        value: 3.11

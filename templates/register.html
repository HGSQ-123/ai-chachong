{% extends "base.html" %}
{% block title %}注册 - {{ site_name }}{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="auth-container">
        <div class="auth-card">
            <h2>📝 免费注册</h2>
            <p class="auth-subtitle">注册即送{{ free_quota_words }}字免费检测额度</p>
            <div id="inviteBanner" style="display:none; background:#fef3c7; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px; text-align:center;">
                🎁 通过邀请链接注册，额外获得 <strong>1000字</strong> 奖励！
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="2-20个字符" required autocomplete="username" minlength="2" maxlength="20">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" class="form-input" placeholder="请输入有效邮箱" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" class="form-input" placeholder="至少6位密码" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="passwordConfirm" class="form-input" placeholder="再次输入密码" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-error" id="registerError" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="btnRegister">注 册</button>
            </form>

            <div class="auth-footer">
                <p>已有账号？<a href="{{ url_for('auth.login_page') }}">立即登录</a></p>
                <p><a href="{{ url_for('main.index') }}">← 返回首页</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
// 读取URL中的邀请码参数
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
if (refCode) {
    document.getElementById('inviteBanner').style.display = 'block';
}

async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('btnRegister');
    const errorEl = document.getElementById('registerError');
    btn.disabled = true;
    btn.textContent = '注册中...';
    errorEl.style.display = 'none';

    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;

    if (password !== passwordConfirm) {
        errorEl.textContent = '两次输入的密码不一致';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '注 册';
        return;
    }

    try {
        const resp = await fetch('{{ url_for("auth.api_register") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: password,
                password_confirm: passwordConfirm,
                ref_code: refCode || '',
            }),
        });
        const data = await resp.json();

        if (data.success) {
            showToast(data.message, 'success');
            setTimeout(() => window.location.href = data.redirect, 800);
        } else {
            errorEl.textContent = data.message;
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '注 册';
        }
    } catch (e) {
        errorEl.textContent = '网络异常，请稍后重试';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '注 册';
    }
}
</script>
{% endblock %}

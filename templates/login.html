{% extends "base.html" %}
{% block title %}登录 - {{ site_name }}{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="auth-container">
        <div class="auth-card">
            <h2>👤 用户登录</h2>
            <p class="auth-subtitle">登录后享受{{ free_quota_words }}字免费检测额度</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <div class="form-error" id="loginError" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="btnLogin">登 录</button>
            </form>

            <div class="auth-footer">
                <p>还没有账号？<a href="{{ url_for('auth.register_page') }}">立即注册</a></p>
                <p><a href="{{ url_for('main.index') }}">← 返回首页</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const errorEl = document.getElementById('loginError');
    btn.disabled = true;
    btn.textContent = '登录中...';
    errorEl.style.display = 'none';

    try {
        const resp = await fetch('{{ url_for("auth.api_login") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
            }),
        });
        const data = await resp.json();

        if (data.success) {
            showToast(data.message, 'success');
            setTimeout(() => window.location.href = data.redirect, 800);
        } else {
            errorEl.textContent = data.message;
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    } catch (e) {
        errorEl.textContent = '网络异常，请稍后重试';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登 录';
    }
}
</script>
{% endblock %}

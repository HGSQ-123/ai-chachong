{% extends "base.html" %}
{% block title %}登录 - {{ site_name }}{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="auth-container">
        <div class="auth-card">
            <h2>👤 用户登录</h2>
            <p class="auth-subtitle">首次检测免费 | 0.49元/千字充值</p>

            <div id="loginPanel">
                <form id="loginForm" onsubmit="return false;">
                    <div class="form-group"><label>账号</label><input type="text" id="account" class="form-input" placeholder="用户名 / 手机号 / 邮箱" required></div>
                    <div class="form-group"><label>密码</label><input type="password" id="password" class="form-input" placeholder="请输入密码" required></div>
                    <div class="form-error" id="loginError" style="display:none;"></div>
                    <button type="button" class="btn btn-primary btn-block" onclick="handleLogin()" id="btnLogin">登 录</button>
                </form>
                <p style="text-align:right; margin-top:8px;">
                    <a href="javascript:showForgotPassword()">忘记密码？</a>
                </p>
            </div>

            <!-- 忘记密码面板 -->
            <div id="forgotPanel" style="display:none;">
                <h3 style="text-align:center;">🔑 重置密码</h3>
                <div class="form-group"><label>手机号 / 邮箱</label><input type="text" id="resetAccount" class="form-input" placeholder="请输入注册时的手机号或邮箱"></div>
                <div class="form-group"><label>图形验证码</label><div style="display:flex; gap:8px; align-items:center;"><input type="text" id="resetCaptcha" class="form-input" placeholder="计算结果" maxlength="4" style="flex:1;"><img id="resetCaptchaImg" src="/auth/api/captcha" onclick="this.src='/auth/api/captcha?'+Date.now()" style="height:42px;border-radius:8px;cursor:pointer;" alt="验证码"></div></div>
                <div class="form-group"><label>验证码</label><div style="display:flex; gap:8px;"><input type="text" id="resetCode" class="form-input" placeholder="6位验证码" maxlength="6" style="flex:1;"><button type="button" class="btn btn-outline" onclick="sendResetCode()" id="btnResetCode">获取验证码</button></div></div>
                <div class="form-group"><label>新密码</label><input type="password" id="resetPassword" class="form-input" placeholder="至少6位新密码" minlength="6"></div>
                <div class="form-error" id="resetError" style="display:none;"></div>
                <button type="button" class="btn btn-primary btn-block" onclick="resetPassword()" id="btnReset">重置密码</button>
                <p style="text-align:center; margin-top:12px;"><a href="javascript:hideForgotPassword()">← 返回登录</a></p>
            </div>

            <div class="auth-footer">
                <p>还没有账号？<a href="{{ url_for('auth.register_page') }}">立即注册</a></p>
                <p><a href="{{ url_for('main.index') }}">← 返回首页</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
async function handleLogin() {
    const btn=document.getElementById('btnLogin'),err=document.getElementById('loginError');
    btn.disabled=true;btn.textContent='登录中...';err.style.display='none';
    try {
        const resp=await fetch('/auth/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({account:document.getElementById('account').value.trim(),password:document.getElementById('password').value})});
        const data=await resp.json();
        if(data.success){showToast(data.message,'success');setTimeout(()=>window.location.href=data.redirect,800);}
        else{err.textContent=data.message;err.style.display='block';btn.disabled=false;btn.textContent='登 录';}
    }catch(e){err.textContent='网络异常';err.style.display='block';btn.disabled=false;btn.textContent='登 录';}
}

function showForgotPassword() {
    document.getElementById('loginPanel').style.display='none';
    document.getElementById('forgotPanel').style.display='block';
}
function hideForgotPassword() {
    document.getElementById('loginPanel').style.display='block';
    document.getElementById('forgotPanel').style.display='none';
}

async function sendResetCode() {
    const account=document.getElementById('resetAccount').value.trim();
    const captcha=document.getElementById('resetCaptcha').value.trim();
    if(!account){showToast('请输入手机号或邮箱','warning');return;}
    if(!captcha){showToast('请输入图形验证码','warning');return;}
    const btn=document.getElementById('btnResetCode');btn.disabled=true;
    try{
        const resp=await fetch('/auth/api/send-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account,captcha})});
        const data=await resp.json();
        if(data.success){showToast(data.message,'info',5000);let s=60;btn.textContent=s+'s';const t=setInterval(()=>{s--;btn.textContent=s+'s';if(s<=0){clearInterval(t);btn.textContent='获取验证码';btn.disabled=false;}},1000);document.getElementById('resetCaptchaImg').src='/auth/api/captcha?'+Date.now();}
        else{showToast(data.message,'error');btn.disabled=false;document.getElementById('resetCaptchaImg').src='/auth/api/captcha?'+Date.now();}
    }catch(e){showToast('网络异常','error');btn.disabled=false;}
}

async function resetPassword() {
    const btn=document.getElementById('btnReset'),err=document.getElementById('resetError');
    btn.disabled=true;btn.textContent='处理中...';err.style.display='none';
    const account=document.getElementById('resetAccount').value.trim(),code=document.getElementById('resetCode').value.trim(),pw=document.getElementById('resetPassword').value;
    try{
        const resp=await fetch('/auth/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account,code,password:pw})});
        const data=await resp.json();
        if(data.success){showToast(data.message,'success');setTimeout(hideForgotPassword,1500);}
        else{err.textContent=data.message;err.style.display='block';}
    }catch(e){err.textContent='网络异常';err.style.display='block';}
    btn.disabled=false;btn.textContent='重置密码';
}
</script>
{% endblock %}

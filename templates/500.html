{% extends "base.html" %}
{% block title %}服务器错误 - {{ site_name }}{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="error-page">
            <div class="error-code">500</div>
            <h2>服务器内部错误</h2>
            <p>抱歉，服务器遇到了一个意外错误，我们正在努力修复中</p>
            <p class="error-hint">请稍后重试，或联系客服 {{ contact_email }}</p>
            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">🏠 返回首页</a>
                <a href="javascript:location.reload()" class="btn btn-outline">🔄 刷新页面</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}

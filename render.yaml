# Render.com 部署配置文件
# 使用方法：在Render.com创建Web Service，选择此仓库即可自动部署

services:
  - type: web
    name: ai-chachong
    env: python
    buildCommand: pip install -r requirements.txt && apt-get update -qq && apt-get install -y -qq tesseract-ocr tesseract-ocr-chi-sim poppler-utils 2>/dev/null || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    # 免费层配置
    plan: free
    # 环境变量
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: XORPAY_APP_ID
        sync: false
      - key: XORPAY_API_SECRET
        sync: false

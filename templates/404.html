{% extends "base.html" %}
{% block title %}页面未找到 - {{ site_name }}{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="error-page">
            <div class="error-code">404</div>
            <h2>页面未找到</h2>
            <p>您访问的页面不存在或已被移除</p>
            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">🏠 返回首页</a>
                <a href="{{ url_for('detect.detect_page') }}" class="btn btn-outline">🔍 立即检测</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}

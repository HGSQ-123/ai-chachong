{% extends "base.html" %}
{% block title %}注册 - {{ site_name }}{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="auth-container">
        <div class="auth-card">
            <h2>📝 免费注册</h2>
            <p class="auth-subtitle">首次检测免费 | 之后0.5元/千字起</p>
            <div id="inviteBanner" style="display:none; background:#fef3c7; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px; text-align:center;">
                🎁 通过邀请链接注册，双方各得500字奖励！
            </div>

            <form id="registerForm" onsubmit="return false;">
                <div class="form-group" style="display:flex; gap:4px; background:var(--bg-light); padding:4px; border-radius:8px;">
                    <button type="button" onclick="switchRegMode('phone')" id="tabPhone" class="tool-tab active" style="flex:1;">📱 手机注册</button>
                    <button type="button" onclick="switchRegMode('email')" id="tabEmail" class="tool-tab" style="flex:1;">📧 邮箱注册</button>
                </div>
                <div class="form-group"><label>用户名</label><input type="text" id="username" class="form-input" placeholder="2-20个字符" required minlength="2" maxlength="20"></div>
                <div class="form-group" id="phoneGroup"><label>手机号</label><input type="tel" id="phone" class="form-input" placeholder="请输入11位手机号" maxlength="11"></div>
                <div class="form-group" id="emailGroup" style="display:none;"><label>邮箱</label><input type="email" id="email" class="form-input" placeholder="请输入邮箱地址"></div>
                <div class="form-group"><label>图形验证码</label><div style="display:flex; gap:8px; align-items:center;"><input type="text" id="captcha" class="form-input" placeholder="左边算式结果" maxlength="4" style="flex:1;"><img id="captchaImg" src="/auth/api/captcha" onclick="this.src='/auth/api/captcha?'+Date.now()" style="height:42px;border-radius:8px;cursor:pointer;" alt="验证码"></div></div>
                <div class="form-group"><label>验证码</label><div style="display:flex; gap:8px;"><input type="text" id="code" class="form-input" placeholder="6位验证码" maxlength="6" style="flex:1;"><button type="button" class="btn btn-outline" onclick="sendCode()" id="btnSendCode" style="white-space:nowrap;">获取验证码</button></div></div>
                <div class="form-group"><label>密码</label><input type="password" id="password" class="form-input" placeholder="至少6位密码" required minlength="6"></div>
                <div class="form-group"><label>确认密码</label><input type="password" id="passwordConfirm" class="form-input" placeholder="再次输入密码" required minlength="6"></div>
                <div class="form-error" id="registerError" style="display:none;"></div>
                <button type="button" class="btn btn-primary btn-block" onclick="handleRegister()" id="btnRegister">注 册</button>
            </form>

            <div class="auth-footer">
                <p>已有账号？<a href="{{ url_for('auth.login_page') }}">立即登录</a></p>
                <p><a href="{{ url_for('main.index') }}">← 返回首页</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let regMode = 'phone';
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
if (refCode) document.getElementById('inviteBanner').style.display = 'block';

function switchRegMode(mode) {
    regMode = mode;
    document.getElementById('tabPhone').classList.toggle('active', mode==='phone');
    document.getElementById('tabEmail').classList.toggle('active', mode==='email');
    document.getElementById('phoneGroup').style.display = mode==='phone'?'block':'none';
    document.getElementById('emailGroup').style.display = mode==='email'?'block':'none';
}

async function sendCode() {
    const account = regMode==='phone' ? document.getElementById('phone').value.trim() : document.getElementById('email').value.trim();
    const captcha = document.getElementById('captcha').value.trim();
    if (!account) { showToast('请先输入'+(regMode==='phone'?'手机号':'邮箱'), 'warning'); return; }
    if (!captcha) { showToast('请先输入图形验证码', 'warning'); return; }
    if (regMode==='phone' && account.length!==11) { showToast('请输入11位手机号', 'warning'); return; }
    if (regMode==='email' && !account.includes('@')) { showToast('请输入正确的邮箱', 'warning'); return; }
    const btn = document.getElementById('btnSendCode'); btn.disabled = true;
    try {
        const resp = await fetch('/auth/api/send-code', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({account,captcha})});
        const data = await resp.json();
        if (data.success) {
            showToast(data.message, 'info', 5000);
            let sec=60; btn.textContent=sec+'s'; 
            const t=setInterval(()=>{sec--;btn.textContent=sec+'s';if(sec<=0){clearInterval(t);btn.textContent='获取验证码';btn.disabled=false;}},1000);
            document.getElementById('captchaImg').src='/auth/api/captcha?'+Date.now();
        } else { showToast(data.message,'error'); btn.disabled=false; document.getElementById('captchaImg').src='/auth/api/captcha?'+Date.now(); }
    } catch(e) { showToast('网络异常','error'); btn.disabled=false; }
}

async function handleRegister() {
    const btn=document.getElementById('btnRegister'), err=document.getElementById('registerError');
    btn.disabled=true; btn.textContent='注册中...'; err.style.display='none';
    const pw=document.getElementById('password').value, pw2=document.getElementById('passwordConfirm').value;
    if (pw!==pw2) { err.textContent='两次密码不一致'; err.style.display='block'; btn.disabled=false; btn.textContent='注 册'; return; }
    const account=regMode==='phone'?document.getElementById('phone').value.trim():document.getElementById('email').value.trim();
    try {
        const resp=await fetch('/auth/api/register', {method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username:document.getElementById('username').value.trim(), [regMode]:account, password:pw, password_confirm:pw2, code:document.getElementById('code').value.trim(), ref_code:refCode||''})});
        const data=await resp.json();
        if(data.success){showToast(data.message,'success');setTimeout(()=>window.location.href=data.redirect,800);}
        else{err.textContent=data.message;err.style.display='block';btn.disabled=false;btn.textContent='注 册';}
    }catch(e){err.textContent='网络异常';err.style.display='block';btn.disabled=false;btn.textContent='注 册';}
}
</script>
{% endblock %}
